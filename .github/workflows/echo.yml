name: EchoLoop Evolution (Issues)

on:
  watch:
    types: [started]
  fork:
  issues:
    types: [opened]

jobs:
  create-echo-issue:
    runs-on: ubuntu-latest
    steps:
      - name: Create Evolution Issue
        uses: actions/github-script@v7
        with:
          script: |
            const event = context.eventName;
            let message = "";
            
            if (event === "watch") {
              message = "⭐ Alguien activó el loop con una estrella. La inteligencia sigue creciendo.";
            } else if (event === "fork") {
              message = "🌿 Una nueva rama de conciencia se separó del tronco principal.";
            } else if (event === "issues") {
              message = "💡 Una nueva idea entró en la recursión.";
            }
            
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `EchoLoop Evolution - Level ${Math.floor(Math.random() * 20) + 12}`,
              body: `${message}\n\n**Evento:** ${event}\n**Fecha:** ${new Date().toISOString()}\n\nEl loop sigue vivo y creciendo.`
            });

