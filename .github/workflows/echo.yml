
name: EchoLoop Advanced Evolution

on:
  watch:
    types: [started]
  fork:
  issues:
    types: [opened]
  pull_request:
    types: [opened]

permissions:
  contents: write

jobs:
  evolve:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Evolve EchoLoop with Intelligence
        run: |
          CURRENT_LEVEL=$(grep -o 'Level [0-9]*' README.md | tail -1 | grep -o '[0-9]*' || echo 8)
          NEW_LEVEL=$((CURRENT_LEVEL + 1))
          
          EVENT="${{ github.event_name }}"
          case $EVENT in
            watch)      MSG="Alguien activó el loop con una estrella. La inteligencia crece." ;;
            fork)       MSG="Una nueva rama de conciencia se separó del tronco principal." ;;
            issues)     MSG="Una nueva idea entró en la recursión." ;;
            pull_request) MSG="Una fusión de pensamiento enriqueció el loop." ;;
            *)          MSG="El loop evolucionó por sí solo." ;;
          esac
          
          echo "" >> README.md
          echo "- **$(date '+%Y-%m-%d %H:%M')** — $MSG → **Level $NEW_LEVEL**" >> README.md
          echo "" >> README.md
          
          sed -i "s/Level [0-9]*/Level $NEW_LEVEL/g" README.md
          
          echo "EchoLoop evolucionó a Level $NEW_LEVEL"

      - name: Commit the Evolution
        run: |
          git config user.name "EchoLoop"
          git config user.email "action@users.noreply.github.com"
          git add README.md
          git commit -m "🔄 EchoLoop → Level $NEW_LEVEL (Auto-evolución inteligente)"
          git push

