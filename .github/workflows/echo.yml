name: EchoLoop Simple

on:
  watch:
    types: [started]
  fork:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  create-issue:
    runs-on: ubuntu-latest
    steps:
      - name: Create Echo Issue
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.REPO_TOKEN }}
          script: |
            const event = context.eventName;
            let title = "EchoLoop Evolution";
            let body = "";

            if (event === "watch") {
              title = "⭐ EchoLoop recibió una estrella";
              body = "Alguien activó el loop. ¡La inteligencia sigue creciendo!";
            } else if (event === "fork") {
              title = "🌿 EchoLoop fue forkeado";
              body = "Se creó una nueva rama del loop.";
            } else if (event === "issues") {
              title = "💡 Nueva idea en EchoLoop";
              body = "Alguien abrió un issue. El loop se enriquece.";
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body + "\n\n**Evento:** " + event + "\n**Fecha:** " + new Date().toISOString()
            });