name: EchoLoop Simple Evolution

on:
  watch:
    types: [started]
  fork:
  issues:
    types: [opened]

jobs:
  evolve:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.REPO_TOKEN }}

      - name: Add Echo and Increase Level
        run: |
          # Leer nivel actual
          LEVEL=$(grep -o 'Level [0-9]*' README.md | tail -1 | grep -o '[0-9]*' || echo 8)
          NEW_LEVEL=$((LEVEL + 1))
          
          # Añadir nuevo echo
          echo "" >> README.md
          echo "- **$(date '+%Y-%m-%d %H:%M')** — El loop evolucionó → **Level $NEW_LEVEL**" >> README.md
          echo "" >> README.md
          
          # Actualizar nivel
          sed -i "s/Level [0-9]*/Level $NEW_LEVEL/g" README.md
          
          echo "Nuevo nivel: $NEW_LEVEL"

      - name: Commit Changes
        run: |
          git config user.name "EchoLoop"
          git config user.email "action@users.noreply.github.com"
          git add README.md
          git commit -m "🔄 EchoLoop Level $NEW_LEVEL"
          git push
          

